<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AUTOBUZZZ</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* GOLD PARTICLES */
.particle{
  position:fixed;
  width:4px;
  height:4px;
  background:gold;
  border-radius:50%;
  opacity:0.6;
  pointer-events:none;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{
    transform:translateY(0);
    opacity:0.8;
  }
  to{
    transform:translateY(-100vh);
    opacity:0;
  }
}

/* HERO */
.hero{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1549921296-3a6b7c7a8e7b?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.75);
}

.hero-content{
  position:relative;
  z-index:2;
}

.hero h1{
  font-size:3rem;
  font-weight:800;
  letter-spacing:4px;
  color:#ffd700;
  text-transform:uppercase;
  text-shadow:
    0 0 5px rgba(255,215,0,0.6),
    0 0 10px rgba(255,215,0,0.6),
    0 0 20px rgba(255,200,0,0.6);
  animation:sparkle 2.5s infinite alternate;
}

@keyframes sparkle{
  0%{text-shadow:0 0 5px rgba(255,215,0,0.4);}
  100%{text-shadow:0 0 25px rgba(255,215,0,1);}
}

.hero p{
  margin:15px 0 30px;
  color:#ccc;
}

/* GOLD BUTTONS */
.hero-buttons a{
  display:block;
  width:220px;
  margin:12px auto;
  padding:14px;
  border-radius:40px;
  text-decoration:none;
  color:black;
  font-weight:600;
  background:linear-gradient(45deg,#ffd700,#ffae00);
  box-shadow:0 0 10px rgba(255,215,0,0.6);
  transition:0.3s;
}

.hero-buttons a:hover{
  transform:translateY(-3px);
  box-shadow:0 0 20px rgba(255,215,0,0.9);
}

/* SERVICES */
.services{
  padding:60px 20px;
  text-align:center;
}

.services h2{
  color:#ffd700;
  margin-bottom:30px;
}

.service-box{
  background:#111;
  margin:12px auto;
  padding:18px;
  border-radius:12px;
  max-width:350px;
  border:1px solid rgba(255,215,0,0.2);
  transition:0.3s;
}

.service-box:hover{
  transform:translateY(-4px);
  border-color:#ffd700;
}

/* CAR SHINE */
.car-showcase{
  text-align:center;
  padding:60px 20px;
}

.car-container{
  position:relative;
  display:inline-block;
}

.car-container img{
  width:90%;
  max-width:500px;
}

.shine{
  position:absolute;
  top:0;
  left:-75%;
  width:50%;
  height:100%;
  background:linear-gradient(
    120deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0.5) 50%,
    rgba(255,255,255,0) 100%
  );
  transform:skewX(-25deg);
  animation:shineMove 3s infinite;
}

@keyframes shineMove{
  0%{left:-75%;}
  100%{left:125%;}
}

/* BEFORE AFTER */
.before-after{
  padding:60px 20px;
  text-align:center;
}

.slider{
  position:relative;
  max-width:400px;
  margin:auto;
  overflow:hidden;
  border-radius:12px;
}

.slider img{
  width:100%;
  display:block;
}

.after-img{
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.range{
  width:100%;
  margin-top:15px;
}
</style>
</head>

<body>

<!-- hooking particle container -->
<div id="particles"></div>

<section class="hero">
  <div class="hero-content">
    <h1>AUTOBUZZZ</h1>
    <p>Multi Services & Premium Car Studio</p>

    <div class="hero-buttons">
      <a href="#services">Our Services</a>
      <a href="#">Book Service</a>
      <a href="#">Instagram</a>
    </div>
  </div>
</section>

<section class="services" id="services">
  <h2>Our Services</h2>
  <div class="service-box">New Car Availability</div>
  <div class="service-box">PPF Coating</div>
  <div class="service-box">Ceramic Coating</div>
  <div class="service-box">Car Detailing</div>
</section>

<section class="car-showcase">
  <h2 style="color:#ffd700;margin-bottom:20px;">Premium Finish</h2>
  <div class="car-container">
    <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1200&q=80">
    <div class="shine"></div>
  </div>
</section>

<section class="before-after">
  <h2 style="color:#ffd700;margin-bottom:20px;">Before / After</h2>
  <div class="slider">
    <img src="https://images.unsplash.com/photo-1493238792000-8113da705763?auto=format&fit=crop&w=800&q=80">
    <div class="after-img" id="after">
      <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c?auto=format&fit=crop&w=800&q=80">
    </div>
  </div>
  <input type="range" min="0" max="100" value="50" class="range" id="range">
</section>

<script>
/* PARTICLES */
function createParticle(){
  const particle=document.createElement("div");
  particle.classList.add("particle");
  particle.style.left=Math.random()*100+"vw";
  particle.style.animationDuration=(Math.random()*3+3)+"s";
  document.body.appendChild(particle);

  setTimeout(()=>{
    particle.remove();
  },6000);
}
setInterval(createParticle,300);

/* BEFORE AFTER SLIDER */
const range=document.getElementById("range");
const after=document.getElementById("after");

range.addEventListener("input",()=>{
  after.style.width=range.value+"%";
});
</script>

</body>
</html>
