
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoBuzz Car Care</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0a;
  --text: #ffffff;
  --card: #111111;
  --accent: #00c3ff;
}

.light-mode {
  --bg: #f5f5f5;
  --text: #111;
  --card: #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
}

/* Header */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: var(--card);
  position: sticky;
  top: 0;
  z-index: 999;
}

.logo {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px var(--accent); }
  to { text-shadow: 0 0 15px var(--accent); }
}

.toggle-btn {
  padding: 8px 12px;
  border: none;
  background: var(--accent);
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
}

/* Hero */
.hero {
  height: 70vh;
  background: url('https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h1 {
  font-size: 2.2rem;
  background: rgba(0,0,0,0.6);
  padding: 15px 20px;
  border-radius: 10px;
}

/* Sections */
section {
  padding: 50px 20px;
}

h2 {
  text-align: center;
  margin-bottom: 30px;
}

/* Services */
.services {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  gap: 15px;
}

.card {
  background: var(--card);
  padding: 20px;
  text-align: center;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card a {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 12px;
  background: var(--accent);
  color: white;
  text-decoration: none;
  border-radius: 5px;
  font-size: 14px;
}

/* Map */
.map iframe {
  width: 100%;
  height: 300px;
  border: 0;
  border-radius: 10px;
}

/* Contact */
.contact {
  text-align: center;
}

.contact a {
  display: inline-block;
  margin: 10px;
  padding: 10px 18px;
  background: var(--accent);
  color: white;
  text-decoration: none;
  border-radius: 6px;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  background: var(--card);
  margin-top: 40px;
}

/* Animation */
.fade-up {
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

.fade-up.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<header>
  <div class="logo">AutoBuzz</div>
  <button class="toggle-btn" onclick="toggleMode()">Light/Dark</button>
</header>

<section class="hero fade-up">
  <h1>Premium Car Care & Detailing</h1>
</section>

<section class="fade-up">
  <h2>Our Services</h2>
  <div class="services">

    <div class="card fade-up">
      <h3>PPF</h3>
      <a href="https://wa.me/91XXXXXXXXXX?text=Hi, I want to do PPF for my car">Enquire</a>
    </div>

    <div class="card fade-up">
      <h3>Ceramic Coating</h3>
      <a href="https://wa.me/91XXXXXXXXXX?text=Hi, I want ceramic coating">Enquire</a>
    </div>

    <div class="card fade-up">
      <h3>Car Wrapping</h3>
      <a href="https://wa.me/91XXXXXXXXXX?text=Hi, I want car wrapping">Enquire</a>
    </div>

    <div class="card fade-up">
      <h3>Interior Cleaning</h3>
      <a href="https://wa.me/91XXXXXXXXXX?text=Hi, I want interior cleaning">Enquire</a>
    </div>

    <div class="card fade-up">
      <h3>Exterior Detailing</h3>
      <a href="https://wa.me/91XXXXXXXXXX?text=Hi, I want exterior detailing">Enquire</a>
    </div>

    <div class="card fade-up">
      <h3>Car Polish</h3>
      <a href="https://wa.me/91XXXXXXXXXX?text=Hi, I want car polish">Enquire</a>
    </div>

  </div>
</section>

<section class="map fade-up">
  <h2>Our Location</h2>
  <iframe src="https://maps.google.com/maps?q=Chhatrapati%20Sambhaji%20Nagar&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</section>

<section class="contact fade-up">
  <h2>Contact Us</h2>
  <a href="https://wa.me/91XXXXXXXXXX">WhatsApp</a>
  <a href="https://instagram.com/YOUR_INSTAGRAM_ID">Instagram</a>
</section>

<footer>
  <p>© 2026 AutoBuzz Car Care</p>
</footer>

<script>
function toggleMode() {
  document.body.classList.toggle("light-mode");
}

/* Scroll animation */
const faders = document.querySelectorAll('.fade-up');

const appearOptions = {
  threshold: 0.2
};

const appearOnScroll = new IntersectionObserver(function(entries, observer) {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    entry.target.classList.add('show');
    observer.unobserve(entry.target);
  });
}, appearOptions);

faders.forEach(fader => {
  appearOnScroll.observe(fader);
});
</script>

</body>
</html>
